{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full">
        <!-- Header -->
        <div class="text-center mb-8">
            <a href="{{ url_for('public.index') }}" class="inline-flex items-center space-x-3 mb-6">
                <div class="w-12 h-12 bg-gradient-to-br from-blue-600 to-purple-600 rounded-xl flex items-center justify-center">
                    <i class="fas fa-book text-white text-xl"></i>
                </div>
                <span class="text-3xl font-bold dark:text-white">Booklet</span>
            </a>
            <h2 class="text-3xl font-bold text-gray-900 dark:text-white">
                Forgot your password?
            </h2>
            <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">
                No worries, we'll send you reset instructions.
            </p>
        </div>
        
        <!-- Form -->
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
            <form method="POST" action="{{ url_for('auth.forgot_password') }}" class="space-y-6">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        Email address
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-envelope text-gray-400"></i>
                        </div>
                        <input type="email" id="email" name="email" required
                            class="block w-full pl-10 pr-3 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                            placeholder="you@example.com">
                    </div>
                </div>
                
                <!-- Submit -->
                <button type="submit"
                    class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                    Send Reset Link
                </button>
            </form>
            
            <!-- Back to Login -->
            <div class="mt-6 text-center">
                <a href="{{ url_for('auth.login') }}" class="text-sm text-gray-600 dark:text-gray-400 hover:text-blue-600">
                    <i class="fas fa-arrow-left mr-1"></i>
                    Back to login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
