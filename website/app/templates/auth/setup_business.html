{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-lg w-full">
        <!-- Header -->
        <div class="text-center mb-8">
            <a href="{{ url_for('public.index') }}" class="inline-flex items-center space-x-3 mb-6">
                <div class="w-12 h-12 bg-gradient-to-br from-blue-600 to-purple-600 rounded-xl flex items-center justify-center">
                    <i class="fas fa-book text-white text-xl"></i>
                </div>
                <span class="text-3xl font-bold dark:text-white">Booklet</span>
            </a>
            <h2 class="text-3xl font-bold text-gray-900 dark:text-white">
                Setup Your Business
            </h2>
            <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">
                Tell us about your business to get started
            </p>
        </div>
        
        <!-- Progress Steps -->
        <div class="mb-8">
            <div class="flex items-center justify-center space-x-4">
                <div class="flex items-center">
                    <div class="w-8 h-8 bg-green-500 rounded-full flex items-center justify-center">
                        <i class="fas fa-check text-white text-sm"></i>
                    </div>
                    <span class="ml-2 text-sm font-medium text-gray-500">Account</span>
                </div>
                <div class="w-16 h-1 bg-blue-600 rounded"></div>
                <div class="flex items-center">
                    <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center">
                        <span class="text-white text-sm font-medium">2</span>
                    </div>
                    <span class="ml-2 text-sm font-medium text-gray-900 dark:text-white">Business</span>
                </div>
            </div>
        </div>
        
        <!-- Account Summary -->
        {% if registration %}
        <div class="mb-6 p-4 bg-green-50 dark:bg-green-900/30 rounded-xl border border-green-200 dark:border-green-800">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-green-100 dark:bg-green-800 rounded-full flex items-center justify-center">
                    <i class="fas fa-check text-green-600 dark:text-green-400"></i>
                </div>
                <div>
                    <p class="font-medium text-gray-900 dark:text-white">{{ registration.name }}</p>
                    <p class="text-sm text-gray-600 dark:text-gray-400">{{ registration.email }}</p>
                </div>
            </div>
        </div>
        {% endif %}
        
        <!-- Business Setup Form -->
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
            <form method="POST" action="{{ url_for('auth.setup_business') }}" class="space-y-6">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                <!-- Business Name -->
                <div>
                    <label for="business_name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        Business Name
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-building text-gray-400"></i>
                        </div>
                        <input type="text" id="business_name" name="business_name" required
                            class="block w-full pl-10 pr-3 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                            placeholder="Acme Corporation">
                    </div>
                </div>
                
                <!-- Business Type -->
                <div>
                    <label for="business_type" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        Business Type
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-tag text-gray-400"></i>
                        </div>
                        <select id="business_type" name="business_type" required
                            class="block w-full pl-10 pr-3 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <option value="">Select business type</option>
                            <option value="retail">Retail</option>
                            <option value="wholesale">Wholesale</option>
                            <option value="manufacturing">Manufacturing</option>
                            <option value="service">Service</option>
                            <option value="restaurant">Restaurant / Food Service</option>
                            <option value="ecommerce">E-commerce</option>
                            <option value="consulting">Consulting</option>
                            <option value="technology">Technology</option>
                            <option value="healthcare">Healthcare</option>
                            <option value="education">Education</option>
                            <option value="construction">Construction</option>
                            <option value="real_estate">Real Estate</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>
                
                <!-- Country -->
                <div>
                    <label for="country" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        Country
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-globe text-gray-400"></i>
                        </div>
                        <select id="country" name="country" required
                            class="block w-full pl-10 pr-3 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            {% for code, name in countries %}
                            <option value="{{ code }}">{{ name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                
                <!-- Currency -->
                <div>
                    <label for="currency" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        Default Currency
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-dollar-sign text-gray-400"></i>
                        </div>
                        <select id="currency" name="currency" required
                            class="block w-full pl-10 pr-3 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            {% for code, name in currencies %}
                            <option value="{{ code }}">{{ name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                
                <!-- Timezone -->
                <div>
                    <label for="timezone" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        Timezone
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-clock text-gray-400"></i>
                        </div>
                        <select id="timezone" name="timezone" required
                            class="block w-full pl-10 pr-3 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            {% for value, label in timezones %}
                            <option value="{{ value }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                
                <!-- Billing Cycle -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-3">
                        Billing Cycle
                    </label>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="relative flex cursor-pointer rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 p-4 focus:outline-none hover:border-blue-500">
                            <input type="radio" name="billing_cycle" value="monthly" class="sr-only" checked>
                            <div class="flex flex-1">
                                <div class="flex items-center">
                                    <div class="text-sm">
                                        <p class="font-medium text-gray-900 dark:text-white">Monthly</p>
                                        <p class="text-gray-500">Billed monthly</p>
                                    </div>
                                </div>
                            </div>
                            <div class="absolute -top-2 -right-2 w-5 h-5 bg-blue-600 rounded-full flex items-center justify-center hidden checked-icon">
                                <i class="fas fa-check text-white text-xs"></i>
                            </div>
                        </label>
                        <label class="relative flex cursor-pointer rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 p-4 focus:outline-none hover:border-blue-500">
                            <input type="radio" name="billing_cycle" value="yearly" class="sr-only">
                            <div class="flex flex-1">
                                <div class="flex items-center">
                                    <div class="text-sm">
                                        <p class="font-medium text-gray-900 dark:text-white">Yearly</p>
                                        <p class="text-gray-500">Save 17%</p>
                                    </div>
                                </div>
                            </div>
                            <span class="absolute -top-2 -right-2 bg-green-500 text-white text-xs px-2 py-0.5 rounded-full">
                                -17%
                            </span>
                        </label>
                    </div>
                </div>
                
                <!-- Submit -->
                <button type="submit"
                    class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                    <i class="fas fa-rocket mr-2"></i>
                    Create My Account
                </button>
            </form>
        </div>
        
        <!-- Back Link -->
        <div class="mt-4 text-center">
            <a href="{{ url_for('auth.register') }}" class="text-sm text-gray-600 dark:text-gray-400 hover:text-blue-600">
                <i class="fas fa-arrow-left mr-1"></i>
                Back to account details
            </a>
        </div>
    </div>
</div>

<script>
// Handle billing cycle selection
document.querySelectorAll('input[name="billing_cycle"]').forEach(radio => {
    radio.addEventListener('change', function() {
        document.querySelectorAll('input[name="billing_cycle"]').forEach(r => {
            const icon = r.closest('label').querySelector('.checked-icon');
            if (r.checked) {
                r.closest('label').classList.add('border-blue-500', 'ring-2', 'ring-blue-500');
                if (icon) icon.classList.remove('hidden');
            } else {
                r.closest('label').classList.remove('border-blue-500', 'ring-2', 'ring-blue-500');
                if (icon) icon.classList.add('hidden');
            }
        });
    });
    // Trigger on load
    radio.dispatchEvent(new Event('change'));
});
</script>
{% endblock %}
