{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900">
    <div class="text-center px-4">
        <div class="mb-8">
            <div class="text-9xl font-bold text-gray-200 dark:text-gray-700">500</div>
        </div>
        <h1 class="text-4xl font-bold text-gray-900 dark:text-white mb-4">Server Error</h1>
        <p class="text-gray-600 dark:text-gray-400 mb-8 max-w-md mx-auto">
            Something went wrong on our end. We're working to fix it. Please try again later.
        </p>
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="{{ url_for('public.index') }}" class="inline-flex items-center justify-center px-6 py-3 bg-sky-500 text-white rounded-lg hover:bg-blue-700 transition-colors">
                <i class="fas fa-home mr-2"></i>
                Go Home
            </a>
            <a href="{{ url_for('public.contact') }}" class="inline-flex items-center justify-center px-6 py-3 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">
                <i class="fas fa-headset mr-2"></i>
                Contact Support
            </a>
        </div>
    </div>
</div>
{% endblock %}
